<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PS-Sarabun - โรงเรียนพิมานพิทยาสรรค์</title>

    <!-- 1. ตั้งค่าสำหรับให้เป็นแอปมือถือ (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PS-Sarabun">
    <meta name="theme-color" content="#1a5276">

    <!-- 2. ลิงก์ไอคอนแอป (เมื่อได้ภาพใหม่ นำ URL มาเปลี่ยนตรงนี้นะคะ) -->
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/joodami/school-assets/main/app-icon.png">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/joodami/school-assets/main/app-icon.png">

    <!-- 3. CSS Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #1a5276; 
            --bg: #f8fafc;
            --main-gradient: linear-gradient(135deg, #1a5276, #2980b9); 
        }

        body, html {
            height: 100%; margin: 0; padding: 0;
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg);
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .app-header {
            background: #ffffff;
            text-align: center;
            border-bottom: 4px solid var(--primary);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        /* Mobile Style (หน้าจอเล็ก) - คงสไตล์เดิมของคุณครู */
        @media (max-width: 1023px) {
            .app-header { padding: 8px 10px 0 10px; }
            .school-logo { height: 40px; margin-bottom: 2px; }
            .app-title { 
                font-size: 1.2rem; 
                line-height: 1.0; 
                color: var(--primary); 
                font-weight: 700; 
                margin-bottom: 0px; 
            }
            .app-subtitle { 
                font-size: 0.75rem; 
                margin-top: 0px; 
                margin-bottom: 5px; 
                font-weight: 600; 
            }
            #mainMenu {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(5, 75px);
                gap: 5px 0;
                padding: 10px 10px;
                align-content: start;
                margin-bottom: 75px;
                overflow-y: auto;
            }
            .icon-box { width: 45px; height: 45px; border-radius: 12px; font-size: 1.2rem; margin-bottom: 3px; }
            .menu-label { 
                font-size: 0.80rem; 
                line-height: 1.1; 
                font-weight: 500; 
            }
            .menu-item { height: 75px; padding: 0; }
        }

        /* Desktop Style (หน้าจอใหญ่) - คงสไตล์เดิมของคุณครู */
        @media (min-width: 1024px) {
            .app-header { padding: 10px 20px 5px 20px; } 
            .school-logo { height: 55px; margin-bottom: 5px; }
            .app-title { font-size: 1.8rem; font-weight: 700; color: var(--primary); margin: 0; }
            .app-subtitle { font-size: 0.95rem; margin-top: 2px; margin-bottom: 5px; color: #475569; }
            #mainMenu {
                grid-template-columns: repeat(5, 1fr);
                grid-template-rows: repeat(2, 140px);
                gap: 15px; 
                padding: 20px 50px;
                max-width: 1100px;
                align-content: center;
                margin-bottom: 80px; 
            }
            .icon-box { width: 65px; height: 65px; border-radius: 18px; font-size: 1.6rem; margin-bottom: 8px; }
            .menu-label { font-size: 1rem; font-weight: 600; color: #1e293b; }
            .menu-item { height: 140px; padding: 10px; }
            .menu-item:hover { transform: translateY(-3px); }
        }

        #mainMenu {
            flex-grow: 1;
            display: grid;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none !important;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-box {
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white;
            background: var(--main-gradient);
            box-shadow: 0 4px 10px rgba(26, 82, 118, 0.2);
        }

        .menu-label { text-align: center; line-height: 1.2; white-space: nowrap; }
        #systemContent { display: none; width: 100%; height: calc(100vh - 70px); border: none; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px; background: white;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #e2e8f0; z-index: 2000;
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center;
            color: #94a3b8; border: none; background: none; flex: 1; font-size: 0.75rem;
        }
        .nav-btn.active { color: var(--primary); font-weight: 600; }
        .nav-btn i { font-size: 1.4rem; margin-bottom: 3px; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header id="headerArea" class="app-header">
        <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" alt="Logo" class="school-logo">
        <h1 class="app-title">PS-Sarabun</h1>
        <p class="app-subtitle">ระบบสารบรรณอิเล็กทรอนิกส์ โรงเรียนพิมานพิทยาสรรค์</p>
    </header>

    <main id="mainMenu">
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookNumber0169/')">
            <div class="icon-box"><i class="fas fa-file-export"></i></div>
            <span class="menu-label">ขอเลขหนังสือออก</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookNumber0269/')">
            <div class="icon-box"><i class="fas fa-gavel"></i></div>
            <span class="menu-label">ขอเลขคำสั่งโรงเรียน</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookNumber0369/')">
            <div class="icon-box"><i class="fas fa-sticky-note"></i></div>
            <span class="menu-label">ขอเลขบันทึกข้อความ</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookCertificat69/')">
            <div class="icon-box"><i class="fas fa-award"></i></div>
            <span class="menu-label">ออกเลขเกียรติบัตร</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/sentonline69/')">
            <div class="icon-box"><i class="fas fa-pen-nib"></i></div>
            <span class="menu-label">เสนอเซ็นหนังสือ</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/track-status69/')">
            <div class="icon-box"><i class="fas fa-history"></i></div>
            <span class="menu-label">ติดตามสถานะหนังสือเสนอเซ็น</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/Reserve-a-car69/')">
            <div class="icon-box"><i class="fas fa-car-side"></i></div>
            <span class="menu-label">จองรถยนต์ส่วนราชการ</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/SearchOrder69/')">
            <div class="icon-box"><i class="fas fa-search"></i></div>
            <span class="menu-label">สืบค้นคำสั่งโรงเรียน</span>
        </div>
        
        <div class="menu-item" onclick="window.open('https://joodami.github.io/download-item/')">
            <div class="icon-box"><i class="fas fa-file-download"></i></div>
            <span class="menu-label">ดาวน์โหลดแบบฟอร์ม</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/ContactLogs/')">
            <div class="icon-box"><i class="fas fa-address-book"></i></div>
            <span class="menu-label">ข้อมูลติดต่อ</span>
        </div>
    </main>

    <iframe id="systemContent" src=""></iframe>

<nav class="bottom-nav">
    <button onclick="goHome()" class="nav-btn active">
        <i class="fas fa-home"></i>
        <span>หน้าแรก</span>
    </button>
    <button onclick="window.location.reload()" class="nav-btn">
        <i class="fas fa-sync-alt"></i>
        <span>รีเฟรช</span>
    </button>
    <button onclick="window.open('https://lin.ee/U7sLDp0', '_blank')" class="nav-btn">
        <i class="fab fa-line" style="color: var(--primary); font-size: 1.6rem;"></i>
        <span style="color: #64748b; font-weight: 500;">ติดต่อ Line</span>
    </button>
</nav>
</div>

<script>
    function openSystem(url) {
        if(url.startsWith('URL_')) {
            alert('ส่วนนี้กำลังเตรียมพร้อมสำหรับเชื่อมต่อระบบของคุณค่ะ');
            return;
        }
        document.getElementById('headerArea').style.display = 'none';
        document.getElementById('mainMenu').style.display = 'none';
        const iframe = document.getElementById('systemContent');
        iframe.style.display = 'block';
        iframe.src = url;
    }

    function goHome() {
        const iframe = document.getElementById('systemContent');
        iframe.src = "";
        iframe.style.display = 'none';
        document.getElementById('headerArea').style.display = 'block';
        document.getElementById('mainMenu').style.display = 'grid';
    }
</script>

</body>
</html>
