<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PS-Sarabun - โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #1a5276;
            --bg: #f0f4f8;
        }

        body, html {
            height: 100%; margin: 0; padding: 0;
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg);
            overflow: hidden; 
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Header ปรับปรุงใหม่เพื่อความชัดเจนในมือถือ --- */
        .app-header {
            background: #ffffff;
            padding: 15px 10px; /* เพิ่มพื้นที่แนวตั้งในมือถือ */
            text-align: center;
            border-bottom: 5px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            flex-shrink: 0;
        }

        .school-logo {
            height: 55px; /* ล็อคขนาดโลโก้ในมือถือให้ชัดเจน */
            width: auto;
            margin-bottom: 8px;
        }

        .app-title {
            font-size: 1.6rem; /* เพิ่มขนาดหัวข้อหลักในมือถือ */
            font-weight: 700;
            color: var(--primary);
            margin: 0;
            line-height: 1.1;
        }

        .app-subtitle {
            font-size: 0.9rem; /* เพิ่มขนาดคำอธิบายในมือถือ */
            color: #334155; /* ปรับสีให้เข้มขึ้นเพื่อให้อ่านง่าย */
            margin-top: 5px;
            font-weight: 600;
        }

        /* สำหรับหน้าจอคอมพิวเตอร์ (ไม่เปลี่ยนแปลงตามที่คุณครูพอใจแล้ว) */
        @media (min-width: 1024px) {
            .app-header {
                padding: 30px 20px;
            }
            .school-logo {
                height: 85px;
            }
            .app-title {
                font-size: 2.5rem;
            }
            .app-subtitle {
                font-size: 1.2rem;
                margin-top: 8px;
            }
        }

        /* --- พื้นที่เมนูหลัก --- */
        #mainMenu {
            flex-grow: 1;
            padding: 8px 15px;
            display: grid;
            gap: 1vh;
            grid-template-columns: 1fr;
            align-content: stretch;
            overflow: hidden;
            margin-bottom: 70px; 
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        @media (min-width: 1024px) {
            #mainMenu {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(4, 1fr);
                gap: 20px;
                padding: 30px 60px;
                margin-bottom: 80px;
            }
        }

        .menu-item {
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            text-decoration: none !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            cursor: pointer;
            min-height: 0; 
        }

        .menu-item:active { transform: scale(0.97); background: #f8fafc; }

        .icon-box {
            width: clamp(32px, 5.5vh, 55px);
            height: clamp(32px, 5.5vh, 55px);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(1rem, 2.5vh, 1.6rem);
            color: white; margin-right: 12px;
            flex-shrink: 0;
        }

        .c1 { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .c2 { background: linear-gradient(135deg, #1abc9c, #16a085); }
        .c3 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .c4 { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .c5 { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .c6 { background: linear-gradient(135deg, #34495e, #2c3e50); }
        .c7 { background: linear-gradient(135deg, #27ae60, #219150); }
        .c8 { background: linear-gradient(135deg, #d35400, #a04000); }

        .menu-label { 
            font-size: clamp(0.85rem, 2vh, 1.15rem);
            font-weight: 600; 
            color: #1e293b;
            white-space: nowrap; 
        }

        #systemContent { display: none; width: 100%; height: calc(100vh - 70px); border: none; background: white; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px; background: white;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #e2e8f0; z-index: 2000;
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center;
            color: #94a3b8; border: none; background: none; flex: 1; font-size: 0.75rem;
        }
        .nav-btn.active { color: var(--primary); font-weight: 600; }
        .nav-btn i { font-size: 1.4rem; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header id="headerArea" class="app-header">
        <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" alt="Logo" class="school-logo">
        <h1 class="app-title">PS-Sarabun</h1>
        <p class="app-subtitle">งานสารบรรณ โรงเรียนพิมานพิทยาสรรค์</p>
    </header>

    <main id="mainMenu">
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookNumber0169/')">
            <div class="icon-box c1"><i class="fas fa-envelope-open-text"></i></div>
            <span class="menu-label">ขอเลขหนังสือออก</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookNumber0269/')">
            <div class="icon-box c2"><i class="fas fa-gavel"></i></div>
            <span class="menu-label">ขอเลขคำสั่งโรงเรียน</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookNumber0369/')">
            <div class="icon-box c3"><i class="fas fa-sticky-note"></i></div>
            <span class="menu-label">ขอเลขบันทึกข้อความ</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookCertificat69/')">
            <div class="icon-box c4"><i class="fas fa-certificate"></i></div>
            <span class="menu-label">ออกเลขเกียรติบัตร</span>
        </div>
        <div class="menu-item" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSewguRcJ9noZvMPJX1QdavSGV8Ib95WUeWVcIInTd0sPGieIA/viewform', '_blank')">
            <div class="icon-box c5"><i class="fas fa-file-signature"></i></div>
            <span class="menu-label">เสนอเซ็นหนังสือราชการ</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/track-status69/')">
            <div class="icon-box c6"><i class="fas fa-tasks"></i></div>
            <span class="menu-label">ติดตามสถานะหนังสือเสนอเซ็น</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/Reserve-a-car69/')">
            <div class="icon-box c7"><i class="fas fa-car"></i></div>
            <span class="menu-label">จองคิวรถยนต์ส่วนราชการ</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/SearchOrder69/')">
            <div class="icon-box c8"><i class="fas fa-search"></i></div>
            <span class="menu-label">สืบค้นคำสั่งโรงเรียน</span>
        </div>
    </main>

    <iframe id="systemContent" src=""></iframe>

    <nav class="bottom-nav">
        <button onclick="goHome()" class="nav-btn active" id="btnHome">
            <i class="fas fa-home"></i>
            <span>หน้าหลัก</span>
        </button>
        <button onclick="window.location.reload()" class="nav-btn">
            <i class="fas fa-sync-alt"></i>
            <span>รีเฟรช</span>
        </button>
        <button onclick="alert('งานสารบรรณ โรงเรียนพิมานพิทยาสรรค์')" class="nav-btn">
            <i class="fas fa-info-circle"></i>
            <span>ติดต่อ</span>
        </button>
    </nav>
</div>

<script>
    const mainMenu = document.getElementById('mainMenu');
    const headerArea = document.getElementById('headerArea');
    const systemContent = document.getElementById('systemContent');

    function openSystem(url) {
        headerArea.style.display = 'none';
        mainMenu.style.display = 'none';
        systemContent.style.display = 'block';
        systemContent.src = url;
    }

    function goHome() {
        systemContent.src = "";
        systemContent.style.display = 'none';
        headerArea.style.display = 'block';
        mainMenu.style.display = 'grid';
    }
</script>

</body>
</html>
