<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PS-Sarabun - โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #1a5276;
            --bg: #f8fafc;
        }

        body, html {
            height: 100%; margin: 0; padding: 0;
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg);
            overflow: hidden; 
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Header: บีบพื้นที่ให้สั้นที่สุดสำหรับมือถือ --- */
        .app-header {
            background: #ffffff;
            text-align: center;
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        /* มือถือ: เน้นความเตี้ยเพื่อเพิ่มที่ว่างให้เมนู */
        @media (max-width: 1023px) {
            .app-header { padding: 5px 10px; }
            .school-logo { height: 35px; margin-bottom: 0; }
            .app-title { font-size: 1.1rem; margin: 0; }
            .app-subtitle { font-size: 0.7rem; margin-top: 0; margin-bottom: 2px; }
        }

        /* คอม: ขนาดใหญ่สวยงามเท่าเดิม */
        @media (min-width: 1024px) {
            .app-header { padding: 25px 20px; }
            .school-logo { height: 75px; margin-bottom: 8px; }
            .app-title { font-size: 2.3rem; }
            .app-subtitle { font-size: 1.1rem; margin-top: 5px; margin-bottom: 12px; }
        }

        /* --- Grid เมนู: บังคับให้ชิดกันในมือถือ --- */
        #mainMenu {
            flex-grow: 1;
            display: grid;
            width: 100%;
            margin: 0 auto;
            overflow: hidden;
        }

        /* สำหรับมือถือ: บีบแถวให้ชิดกันที่สุด (ลบระยะห่างที่เกินออก) */
        @media (max-width: 1023px) {
            #mainMenu {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(4, 75px); /* ล็อคความสูงแถวละ 75px เท่านั้น */
                gap: 5px 0; /* ระยะห่างซ้ายขวา 5px แต่บนล่าง 0 */
                padding: 10px 10px;
                align-content: start; /* ดันเมนูขึ้นไปชิดด้านบน */
                margin-bottom: 75px;
            }
            .icon-box { width: 42px; height: 42px; border-radius: 10px; font-size: 1.1rem; margin-bottom: 2px; }
            .menu-label { font-size: 0.75rem; line-height: 1.1; display: block; }
            .menu-item { height: 75px; padding: 0; } /* บังคับความสูงเมนูให้เตี้ยลง */
        }

        /* สำหรับคอม: คงค่าเดิมที่สวยงาม */
        @media (min-width: 1024px) {
            #mainMenu {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(2, 1fr);
                gap: 30px;
                padding: 30px 80px;
                margin-bottom: 80px;
                max-width: 1200px;
                align-content: center;
            }
            .icon-box { width: 85px; height: 85px; border-radius: 22px; font-size: 2rem; margin-bottom: 10px; }
            .menu-label { font-size: 1.1rem; font-weight: 600; }
            .menu-item { padding: 15px; }
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none !important;
            cursor: pointer;
        }

        .icon-box {
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .c1 { background: linear-gradient(135deg, #FF5F6D, #FFC371); }
        .c2 { background: linear-gradient(135deg, #2193b0, #6dd5ed); }
        .c3 { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .c4 { background: linear-gradient(135deg, #ee0979, #ff6a00); }
        .c5 { background: linear-gradient(135deg, #4568dc, #b06ab3); }
        .c6 { background: linear-gradient(135deg, #00b09b, #96c93d); }
        .c7 { background: linear-gradient(135deg, #f2994a, #f2c94c); }
        .c8 { background: linear-gradient(135deg, #4b6cb7, #182848); }

        .menu-label { font-weight: 600; color: #1e293b; text-align: center; }

        #systemContent { display: none; width: 100%; height: calc(100vh - 75px); border: none; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 75px; background: white;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #e2e8f0; z-index: 2000;
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center;
            color: #94a3b8; border: none; background: none; flex: 1; font-size: 0.8rem;
        }
        .nav-btn.active { color: var(--primary); font-weight: 600; }
        .nav-btn i { font-size: 1.5rem; margin-bottom: 3px; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header id="headerArea" class="app-header">
        <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" alt="Logo" class="school-logo">
        <h1 class="app-title">PS-Sarabun</h1>
        <p class="app-subtitle">ระบบสารบรรณอิเล็กทรอนิกส์ โรงเรียนพิมานพิทยาสรรค์</p>
    </header>

    <main id="mainMenu">
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookNumber0169/')">
            <div class="icon-box c1"><i class="fas fa-file-export"></i></div>
            <span class="menu-label">เลขหนังสือออก</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookNumber0269/')">
            <div class="icon-box c2"><i class="fas fa-gavel"></i></div>
            <span class="menu-label">เลขคำสั่ง</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookNumber0369/')">
            <div class="icon-box c3"><i class="fas fa-sticky-note"></i></div>
            <span class="menu-label">เลขบันทึกข้อความ</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookCertificat69/')">
            <div class="icon-box c4"><i class="fas fa-award"></i></div>
            <span class="menu-label">ออกเกียรติบัตร</span>
        </div>
        <div class="menu-item" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSewguRcJ9noZvMPJX1QdavSGV8Ib95WUeWVcIInTd0sPGieIA/viewform', '_blank')">
            <div class="icon-box c5"><i class="fas fa-pen-nib"></i></div>
            <span class="menu-label">เสนอเซ็นหนังสือ</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/track-status69/')">
            <div class="icon-box c6"><i class="fas fa-history"></i></div>
            <span class="menu-label">ติดตามสถานะ</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/Reserve-a-car69/')">
            <div class="icon-box c7"><i class="fas fa-car-side"></i></div>
            <span class="menu-label">จองรถส่วนกลาง</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/SearchOrder69/')">
            <div class="icon-box c8"><i class="fas fa-search"></i></div>
            <span class="menu-label">สืบค้นคำสั่ง</span>
        </div>
    </main>

    <iframe id="systemContent" src=""></iframe>

    <nav class="bottom-nav">
        <button onclick="goHome()" class="nav-btn active">
            <i class="fas fa-home"></i>
            <span>หน้าแรก</span>
        </button>
        <button onclick="window.location.reload()" class="nav-btn">
            <i class="fas fa-sync-alt"></i>
            <span>รีเฟรช</span>
        </button>
        <button onclick="alert('งานสารบรรณ โรงเรียนพิมานพิทยาสรรค์')" class="nav-btn">
            <i class="fas fa-user-circle"></i>
            <span>ติดต่อ</span>
        </button>
    </nav>
</div>

<script>
    function openSystem(url) {
        document.getElementById('headerArea').style.display = 'none';
        document.getElementById('mainMenu').style.display = 'none';
        const iframe = document.getElementById('systemContent');
        iframe.style.display = 'block';
        iframe.src = url;
    }

    function goHome() {
        const iframe = document.getElementById('systemContent');
        iframe.src = "";
        iframe.style.display = 'none';
        document.getElementById('headerArea').style.display = 'block';
        document.getElementById('mainMenu').style.display = 'grid';
    }
</script>

</body>
</html>
