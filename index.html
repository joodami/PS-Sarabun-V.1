<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PS-Sarabun - โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #1a5276;
            --bg: #f8fafc;
            /* โทนสีใหม่: ไล่เฉดสีน้ำเงิน-ฟ้า */
            --grad-1: linear-gradient(135deg, #2c3e50, #4ca1af);
            --grad-2: linear-gradient(135deg, #1e3c72, #2a5298);
            --grad-3: linear-gradient(135deg, #36d1dc, #5b86e5);
            --grad-4: linear-gradient(135deg, #2b5876, #4e4376);
        }

        body, html {
            height: 100%; margin: 0; padding: 0;
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg);
            overflow: hidden; 
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Header: ล็อคค่าที่สวยงามแล้ว --- */
        .app-header {
            background: #ffffff;
            text-align: center;
            border-bottom: 4px solid var(--primary);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        @media (max-width: 1023px) {
            .app-header { padding: 8px 10px 0 10px; }
            .school-logo { height: 40px; margin-bottom: 2px; }
            .app-title { font-size: 1.2rem; line-height: 1.1; }
            .app-subtitle { font-size: 0.75rem; margin-top: 2px; margin-bottom: 5px; font-weight: 600; }
        }

        @media (min-width: 1024px) {
            .app-header { padding: 10px 20px 5px 20px; } 
            .school-logo { height: 55px; margin-bottom: 5px; }
            .app-title { font-size: 1.8rem; font-weight: 700; color: var(--primary); margin: 0; }
            .app-subtitle { font-size: 0.95rem; margin-top: 2px; margin-bottom: 5px; color: #475569; }
        }

        /* --- Grid เมนูหลัก: ล็อคค่าระยะบรรทัดและขนาด --- */
        #mainMenu {
            flex-grow: 1;
            display: grid;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        /* มือถือ: ล็อคค่าที่เห็นครบ 8 เมนู */
        @media (max-width: 1023px) {
            #mainMenu {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(4, 75px);
                gap: 5px 0;
                padding: 10px 10px;
                align-content: start;
                margin-bottom: 75px;
            }
            .icon-box { width: 45px; height: 45px; border-radius: 12px; font-size: 1.2rem; margin-bottom: 2px; }
            .menu-label { font-size: 0.75rem; line-height: 1.1; }
            .menu-item { height: 75px; padding: 0; }
        }

        /* คอมพิวเตอร์: ล็อคค่าที่พอดี ไม่ล้นจอ */
        @media (min-width: 1024px) {
            #mainMenu {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(2, 140px);
                gap: 15px; 
                padding: 20px 50px;
                max-width: 900px;
                align-content: center;
                margin-bottom: 80px; 
            }
            .icon-box { width: 65px; height: 65px; border-radius: 18px; font-size: 1.6rem; margin-bottom: 8px; }
            .menu-label { font-size: 1rem; font-weight: 600; color: #1e293b; }
            .menu-item { height: 140px; padding: 10px; }
            .menu-item:hover { transform: translateY(-3px); }
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none !important;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-box {
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white;
            box-shadow: 0 4px 10px rgba(26, 82, 118, 0.2);
        }

        /* --- การคุมโทนสีใหม่ (Blue Theme) --- */
        .c1 { background: var(--grad-1); }
        .c2 { background: var(--grad-2); }
        .c3 { background: var(--grad-3); }
        .c4 { background: var(--grad-4); }
        .c5 { background: var(--grad-2); }
        .c6 { background: var(--grad-1); }
        .c7 { background: var(--grad-4); }
        .c8 { background: var(--grad-3); }

        .menu-label { text-align: center; line-height: 1.2; white-space: nowrap; }

        #systemContent { display: none; width: 100%; height: calc(100vh - 70px); border: none; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px; background: white;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #e2e8f0; z-index: 2000;
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center;
            color: #94a3b8; border: none; background: none; flex: 1; font-size: 0.75rem;
        }
        .nav-btn.active { color: var(--primary); font-weight: 600; }
        .nav-btn i { font-size: 1.4rem; margin-bottom: 3px; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header id="headerArea" class="app-header">
        <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" alt="Logo" class="school-logo">
        <h1 class="app-title">PS-Sarabun</h1>
        <p class="app-subtitle">ระบบสารบรรณอิเล็กทรอนิกส์ โรงเรียนพิมานพิทยาสรรค์</p>
    </header>

    <main id="mainMenu">
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookNumber0169/')">
            <div class="icon-box c1"><i class="fas fa-file-export"></i></div>
            <span class="menu-label">เลขหนังสือออก</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookNumber0269/')">
            <div class="icon-box c2"><i class="fas fa-gavel"></i></div>
            <span class="menu-label">เลขคำสั่ง</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookNumber0369/')">
            <div class="icon-box c3"><i class="fas fa-sticky-note"></i></div>
            <span class="menu-label">เลขบันทึกข้อความ</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/BookCertificat69/')">
            <div class="icon-box c4"><i class="fas fa-award"></i></div>
            <span class="menu-label">ออกเกียรติบัตร</span>
        </div>
        <div class="menu-item" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSewguRcJ9noZvMPJX1QdavSGV8Ib95WUeWVcIInTd0sPGieIA/viewform', '_blank')">
            <div class="icon-box c5"><i class="fas fa-pen-nib"></i></div>
            <span class="menu-label">เสนอเซ็นหนังสือ</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/track-status69/')">
            <div class="icon-box c6"><i class="fas fa-history"></i></div>
            <span class="menu-label">ติดตามสถานะ</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/Reserve-a-car69/')">
            <div class="icon-box c7"><i class="fas fa-car-side"></i></div>
            <span class="menu-label">จองรถส่วนกลาง</span>
        </div>
        <div class="menu-item" onclick="openSystem('https://joodami.github.io/SearchOrder69/')">
            <div class="icon-box c8"><i class="fas fa-search"></i></div>
            <span class="menu-label">สืบค้นคำสั่ง</span>
        </div>
    </main>

    <iframe id="systemContent" src=""></iframe>

    <nav class="bottom-nav">
        <button onclick="goHome()" class="nav-btn active">
            <i class="fas fa-home"></i>
            <span>หน้าแรก</span>
        </button>
        <button onclick="window.location.reload()" class="nav-btn">
            <i class="fas fa-sync-alt"></i>
            <span>รีเฟรช</span>
        </button>
        <button onclick="alert('งานสารบรรณ โรงเรียนพิมานพิทยาสรรค์')" class="nav-btn">
            <i class="fas fa-user-circle"></i>
            <span>ติดต่อ</span>
        </button>
    </nav>
</div>

<script>
    function openSystem(url) {
        document.getElementById('headerArea').style.display = 'none';
        document.getElementById('mainMenu').style.display = 'none';
        const iframe = document.getElementById('systemContent');
        iframe.style.display = 'block';
        iframe.src = url;
    }

    function goHome() {
        const iframe = document.getElementById('systemContent');
        iframe.src = "";
        iframe.style.display = 'none';
        document.getElementById('headerArea').style.display = 'block';
        document.getElementById('mainMenu').style.display = 'grid';
    }
</script>

</body>
</html>
